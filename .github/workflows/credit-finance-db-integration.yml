name: Credit Finance DB Integration

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: credit-finance-db-${{ github.ref }}
  cancel-in-progress: true

jobs:
  credit-finance-db:
    name: Credit and finance PostgreSQL scenarios
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tomverse_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tomverse_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/tomverse_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run financial DB integration tests
        run: npm run test:db:integration
