name: Secret History Scan

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "45 22 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Scan repository history for secrets
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
