name: PR Fast Gate

on:
  pull_request:

permissions:
  actions: read
  contents: read
  pull-requests: read

concurrency:
  group: pr-fast-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fast-gate:
    name: Security, unit, build, and Chromium smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 40
    # NEXT_PUBLIC values are embedded by `next build`. Guest E2E tests mock
    # Turnstile in the browser, but the client still requires a configured key.
    env:
      NEXTAUTH_URL: http://127.0.0.1:3100
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: tomverse-playwright-turnstile-site-key

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan pull-request commits for secrets
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Restore Next.js build cache
        continue-on-error: true
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-pr-${{ hashFiles('package-lock.json') }}-${{ hashFiles('app/**/*.ts', 'app/**/*.tsx', 'components/**/*.ts', 'components/**/*.tsx', 'lib/**/*.ts', 'lib/**/*.tsx', 'next.config.ts', 'tsconfig.json') }}
          restore-keys: |
            ${{ runner.os }}-next-pr-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-next-

      - name: Install dependencies
        run: npm ci

      - name: Security regression checks
        run: npm run security:regression

      - name: Unit and API policy tests
        run: npm run test:unit

      - name: Strict encoding validation
        run: npm run check:encoding:strict

      - name: ESLint and production build
        run: npm run check

      - name: Restore Playwright Chromium cache
        continue-on-error: true
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}-chromium
          restore-keys: |
            ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}-

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run desktop Chromium PR smoke tests
        run: npm run test:e2e:pr

      - name: Upload failed test evidence
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pr-fast-gate-playwright-${{ github.run_id }}
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore
          retention-days: 14
