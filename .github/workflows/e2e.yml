name: Main Chromium Regression

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: main-chromium-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Chromium desktop and mobile regression
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Keep the production client bundle on the same deterministic Turnstile
    # configuration used by the isolated Playwright server.
    env:
      NEXTAUTH_URL: http://127.0.0.1:3100
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: tomverse-playwright-turnstile-site-key

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Restore Next.js build cache
        continue-on-error: true
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-main-${{ hashFiles('package-lock.json') }}-${{ hashFiles('app/**/*.ts', 'app/**/*.tsx', 'components/**/*.ts', 'components/**/*.tsx', 'lib/**/*.ts', 'lib/**/*.tsx', 'next.config.ts', 'tsconfig.json') }}
          restore-keys: |
            ${{ runner.os }}-next-main-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-next-

      - name: Install dependencies
        run: npm ci

      - name: Build once for the Chromium test server
        run: npm run build

      - name: Restore Playwright Chromium cache
        continue-on-error: true
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}-chromium
          restore-keys: |
            ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}-

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Chromium desktop and mobile E2E tests
        run: npm run test:e2e:chromium

      - name: Upload failed test evidence
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: main-chromium-test-results-${{ github.run_id }}
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore
          retention-days: 14
