name: Weekly Security Audit

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    # Mondays at 09:00 Australia/Brisbane (23:00 UTC Sunday, no DST in Brisbane).
    - cron: "0 23 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dependency vulnerability audit
        run: npm audit --omit=dev

      - name: Security regression checks
        run: npm run security:regression

      - name: Unit and API policy tests
        run: npm run test:unit

      - name: Type, lint, and production build
        run: npm run check

      - name: Security audit summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Tomverse Security Audit"
            echo ""
            echo "- Dependency audit: see job logs"
            echo "- Security regression script: see job logs"
            echo "- Unit and API policy tests: see job logs"
            echo "- Lint/type/build gate: see job logs"
            echo ""
            echo "Review this workflow if any prior step failed."
          } >> "$GITHUB_STEP_SUMMARY"
